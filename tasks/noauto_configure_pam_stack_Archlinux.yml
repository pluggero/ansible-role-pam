---
- name: Deploy system-auth PAM stack
  ansible.builtin.template:
    src: pam_stack_Archlinux.j2
    dest: /etc/pam.d/system-auth
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true

- name: Deploy passwd PAM service file
  ansible.builtin.template:
    src: pam_passwd_Archlinux.j2
    dest: /etc/pam.d/passwd
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
